<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Inventory Management System</title>
    <link rel="stylesheet" href="style.css" />
</head>
<body>
<header class="topbar">
    <h1><img src="logo.png" style="height:36px;">
        <img src="logo2.png" style="height:36px;">
    </h1>

    <div class="auth">
        <input id="username" placeholder="Username" />
        <input id="password" placeholder="Password" type="password" />
        <button id="btnSaveAuth">LOGIN</button>
        <span id="authStatus" class="muted">Not connected</span>
    </div>
</header>

<main class="container">

    <section class="card">
        <h2>Add Item</h2>

        <div class="grid">
            <input id="name" placeholder="Description (e.g., Router)" />
            <input id="category" placeholder="Category (e.g., Networking)" />
            <input id="location" placeholder="Location (e.g., Warehouse A)" />
            <input id="quantity" placeholder="Quantity" type="number" min="0" />
        </div>

        <div class="row">
            <button id="btnAdd">Add Item</button>
            <button id="btnRefresh" class="secondary">Refresh</button>

            <button id="btnImport" class="secondary">Import Excel</button>
            <input type="file" id="excelFile" accept=".xlsx" />

            <span id="msg" class="muted"></span>
        </div>
    </section>

    <section class="card">
        <div class="row space-between">
            <h2>Items</h2>
            <input id="search" placeholder="Search name/category/location..." />
        </div>

        <table>
            <thead>
            <tr>
                <th style="width:80px;">Serial Number</th>
                <th>Description</th>
                <th>Category</th>
                <th>Location</th>
                <th style="width:110px;">Quantity</th>
                <th style="width:220px;">Actions</th>
            </tr>
            </thead>
            <tbody id="itemsBody"></tbody>
        </table>
    </section>

    <section class="card">
        <div class="row space-between">
            <h2>Inventory History</h2>
            <button id="refreshHistoryBtn" class="secondary">Refresh History</button>
        </div>

        <table id="historyTable">
            <thead>
            <tr>
                <th>Date</th>
                <th>Item</th>
                <th>Action</th>
                <th>Qty Change</th>
            </tr>
            </thead>
            <tbody id="historyBody"></tbody>
        </table>
    </section>

</main>

<div id="modal" class="modal hidden">
    <div class="modal-card">
        <h3>Edit Item</h3>

        <div class="grid">
            <input id="editId" placeholder="ID" disabled />
            <input id="editName" placeholder="Name" />
            <input id="editCategory" placeholder="Category" />
            <input id="editLocation" placeholder="Location" />
            <input id="editQuantity" placeholder="Quantity" type="number" min="0" />
        </div>

        <div class="row">
            <button id="btnSaveEdit">Save</button>
            <button id="btnCancelEdit" class="secondary">Cancel</button>
            <span id="editMsg" class="muted"></span>
        </div>
    </div>
</div>

<script src="app.js"></script>
</body>
</html>
