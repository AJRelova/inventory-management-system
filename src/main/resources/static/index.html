<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Nxtgen-Ultegra Inventory Management System</title>


    <link rel="icon" type="image/png" href="icon.png">

    <link rel="stylesheet" href="style.css" />
</head>
<body>
<div id="loginModal" class="modal">
    <div class="modal-card login-card">
        <div class="brand-row login-logos">
            <img src="logo.png" alt="Logo" class="brand-logo">
            <img src="logo2.png" alt="Logo" class="brand-logo">
        </div>
        <h2>Login</h2>
        <p class="muted">Enter your credentials to access Nxtgen-Ultegra inventory.</p>
        <div class="grid two-col">
            <input id="username" placeholder="Username" />
            <input id="password" placeholder="Password" type="password" />
        </div>
        <div class="row">
            <button id="btnSaveAuth">Login</button>
            <span id="authStatus" class="muted">Not connected</span>
        </div>
    </div>
</div>

<header class="topbar">
    <button id="menuToggle" class="menu-btn">☰</button>

    <div class="brand-row">
        <img src="logo.png" alt="Logo" class="brand-logo">
        <img src="logo2.png" alt="Logo 2" class="brand-logo">
    </div>

    <div class="topbar-right">
        <div class="search-box">
            <span class="search-icon">🔍</span>
            <input id="search" placeholder="Search serial number, description, category, or location" />
            <span id="userRoleDisplay" class="muted"></span>
        </div>
    </div>
</header>

<main class="container dashboard">
    <section class="card side-panel hidden" id="sidePanel">
        <h2>Add Item</h2>
        <div class="grid one-col">
            <input id="serialNumber" placeholder="Serial Number" />
            <input id="description" placeholder="Description" />
            <select id="category"></select>
            <select id="location"></select>
            <input id="quantity" placeholder="Quantity" type="number" min="0" />
            <input id="deliveryReceipt" placeholder="Delivery Receipt" />
            <input id="hardwareRevision" placeholder="Hardware Revision" />
            <input id="vendor" placeholder="Vendor" />
            <input id="imageFile" type="file" accept="image/*" />
        </div>

        <div class="row wrap">
            <button id="btnAdd">Add Item</button>
            <button id="btnRefresh" class="secondary">Refresh</button>
            <button id="btnImport" class="secondary">Import Excel</button>
            <input type="file" id="excelFile" accept=".xlsx" />
        </div>
        <span id="msg" class="muted block-msg"></span>
    </section>

    <section class="content-panel">
        <section class="card">
            <div class="row space-between wrap">
                <h2>Items</h2>
                <button id="btnExport" class="secondary">Export Excel</button>
            </div>

            <div class="table-wrap">
                <table>
                    <thead>
                    <tr>
                        <th>Serial Number/IMEI</th>
                        <th>Description</th>
                        <th>Category</th>
                        <th>Location</th>
                        <th>Quantity</th>
                        <th>Last Edited By</th>
                        <th>Actions</th>
                    </tr>
                    </thead>
                    <tbody id="itemsBody"></tbody>
                </table>
            </div>
        </section>
    </section>
</main>



<script src="app.js"></script>
</body>
</html>
